<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLCC | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body style="overflow-y: auto;"> <div class="main-bg"></div>
    <div class="overlay-tint"></div>

    <div id="login-overlay" class="modal" style="display: flex; background: rgba(0,0,0,0.95); z-index: 9999;">
        <div class="glass-card">
            <h2 class="gold-text">Mission Control</h2>
            <p class="form-hint" style="color: white; opacity: 0.8;">Enter Authorized Security Key</p>
            <input type="password" id="pass-input" placeholder="••••••••" class="sleek-input" style="text-align: center; letter-spacing: 5px;">
            <button class="premium-gold-btn" onclick="checkPass()">UNLOCK DASHBOARD</button>
        </div>
    </div>

    <div id="admin-ui" style="display: none; padding-top: 40px;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 class="gold-text" style="font-size: 2.5rem;">MISSION CONTROL</h1>
            <p style="letter-spacing: 3px; opacity: 0.7;">DIVINE LIFE CHRISTIAN CENTRE</p>
        </div>

        <div class="admin-dashboard-grid">
            
            <div class="admin-panel">
                <h2 class="gold-text" style="font-size: 1.2rem; margin-bottom: 15px;">🚨 LIVE BROADCAST</h2>
                <p class="form-hint">Type the sermon topic to trigger the Red Alert on all phones.</p>
                <input type="text" id="sermon-input" placeholder="Current Sermon Topic..." class="sleek-input">
                <button class="premium-gold-btn" onclick="updateSermon()">GO LIVE NOW</button>
                
                <button class="premium-gold-btn" onclick="document.getElementById('sermon-input').value=''; updateSermon();" 
                        style="margin-top: 10px; background: #333; color: white;">
                    END BROADCAST (RESET)
                </button>
            </div>

            <div class="admin-panel">
                <h2 class="gold-text" style="font-size: 1.2rem;">🕊️ LIVE FEED</h2>
                <div class="scroll-area" id="prayer-list">
                    <p style="opacity: 0.3; margin-top: 20px;">Waiting for mission data...</p>
                </div>
            </div>

        </div>

        <div style="text-align: center; margin-top: 40px; padding-bottom: 40px;">
            <button onclick="location.reload()" style="background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer;">Logout & Lock</button>
        </div>
    </div>

    <script src="church-logic.js"></script>
</body>
</html>
