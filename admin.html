<body style="overflow-y: auto;"> 
    <div class="main-bg"></div>
    <div class="overlay-tint"></div>

    <!-- ========================================== -->
    <!-- MISSION CONTROL SECURITY LOGIN OVERLAY     -->
    <!-- ========================================== -->
    <div id="login-overlay" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;">
        <div style="margin-bottom: 20px;">
            <h1 class="gold-text" style="font-size: 2rem; margin-bottom: 5px;">DIVINE LIFE</h1>
            <p style="letter-spacing: 2px; opacity: 0.6; font-size: 0.8rem;">MISSION CONTROL LOCK</p>
        </div>
        
        <input type="text" id="pass-input" placeholder="Enter Code..." autocomplete="new-password" name="dlcc-code"
               style="background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); padding: 12px 20px; border-radius: 5px; color: white; text-align: center; margin-bottom: 15px; font-size: 1rem; width: 250px; -webkit-text-security: disc;">
        
        <button onclick="checkPass()" class="premium-gold-btn" style="width: 250px; padding: 12px;">UNLOG & ENTER</button>
    </div>

    <!-- ========================================== -->
    <!-- DASHBOARD CONTENT (Hidden until login)     -->
    <!-- ========================================== -->
    <div id="admin-ui" style="display: none; padding: 40px 20px; max-width: 600px; margin: 0 auto;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 class="gold-text" style="font-size: 2.5rem;">MISSION CONTROL</h1>
            <p style="letter-spacing: 3px; opacity: 0.7;">DIVINE LIFE CHRISTIAN CENTRE</p>
        </div>

        <!-- 1. Add New Member Panel -->
        <div class="admin-panel" style="margin-bottom: 20px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; border: 1px solid rgba(212,175,55,0.2);">
            <h2 class="gold-text" style="font-size: 1.1rem; margin-bottom: 15px;">Add New Member</h2>
            <input type="text" id="new_member_name" placeholder="Member Name (e.g. Sister Grace)" class="sleek-input" style="margin-bottom: 10px; width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); color: #fff; border-radius: 6px;">
            <input type="text" id="new_member_phone" placeholder="Phone Number (e.g. +1234567890)" class="sleek-input" style="margin-bottom: 10px; width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); color: #fff; border-radius: 6px;">
            <button class="premium-gold-btn" onclick="saveNewMember()" style="width: 100%; padding: 10px;">SAVE MEMBER</button>
        </div>

        <!-- 2. Member WhatsApp Directory Panel -->
        <div class="admin-panel" style="margin-bottom: 20px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; border: 1px solid rgba(212,175,55,0.2);">
            <h2 class="gold-text" style="font-size: 1.2rem; margin-bottom: 5px;">Member WhatsApp Directory</h2>
            <p class="form-hint" style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">Click a member to message them directly on WhatsApp</p>
            
            <div style="margin-top: 10px;">
                <input type="text" id="wa_quick_message" placeholder="Type message to send to selected member..." class="sleek-input" style="margin-bottom: 15px; width: 100%; padding: 10px; border-radius: 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); color: #fff;">
            </div>

            <div id="member-directory-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto;">
                <p style="opacity: 0.3; text-align: center; padding: 10px;">Loading members...</p>
            </div>
        </div>

        <!-- 3. Live Feed Panel -->
        <div class="admin-panel" style="background: rgba(0,0,0,0.6); padding: 20px; border-radius: 12px; border: 1px solid rgba(212,175,55,0.2);">
            <h2 class="gold-text" style="font-size: 1.2rem; margin-bottom: 10px;">🕊️ LIVE FEED</h2>
            <div class="scroll-area" id="prayer-list" style="max-height: 250px; overflow-y: auto;">
                <p style="opacity: 0.3; margin-top: 20px;">Waiting for mission data...</p>
            </div>
        </div>

    </div>

    <script src="church-logic.js"></script>
</body>
</html>
