<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLCC | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght=900&family=Poppins:wght=400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase core dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body> 
    <div class="main-bg"></div>
    <div class="overlay-tint"></div>

    <!-- MENU HAMBURGER TRIGGER (Controls the dashboard drawer drawer) -->
    <div class="menu-trigger" onclick="toggleMenu()">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <!-- ========================================== -->
    <!-- MISSION CONTROL SECURITY LOGIN OVERLAY     -->
    <!-- ========================================== -->
    <div id="login-overlay" class="modal open">
        <div class="glass-card">
            <div style="margin-bottom: 20px;">
                <h1 class="gold-text" style="font-size: 2rem;">DIVINE LIFE</h1>
                <p style="letter-spacing: 2px; opacity: 0.6; font-size: 0.8rem; color: white;">MISSION CONTROL LOCK</p>
            </div>
            
            <input type="text" id="pass-input" placeholder="Enter Code..." autocomplete="new-password" name="dlcc-code" class="sleek-input" style="-webkit-text-security: disc; text-align: center;">
            <button type="button" onclick="checkPass()" class="premium-gold-btn" style="width: 100%; margin-top: 20px;">UNLOG &amp; ENTER</button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- THE MISSION INTERFACE SIDE DRAWER          -->
    <!-- ========================================== -->
    <!-- CRITICAL: Linked to your CSS .nav-overlay and structuralized wrapper properties -->
    <div id="side-nav" class="nav-overlay">
        <div id="admin-ui" class="admin-dashboard-grid">
            
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 class="main-heading" style="font-size: 2rem; -webkit-text-fill-color: initial; background: none; color: #D4AF37;">MISSION CONTROL</h1>
                <p class="church-name">DIVINE LIFE CHRISTIAN CENTRE</p>
            </div>

            <!-- Broadcast Controller Block -->
            <div class="admin-panel">
                <span class="gold-text">🚨 LIVE BROADCAST</span>
                <p class="form-hint">Type the sermon topic to trigger the Red Alert on all phones.</p>
                <input type="text" id="sermon-input" placeholder="Current Sermon Topic..." class="sleek-input">
                <button class="premium-gold-btn" onclick="updateSermon()" style="width: 100%;">GO LIVE NOW</button>
                <button class="premium-gold-btn" onclick="document.getElementById('sermon-input').value=''; updateSermon();" style="margin-top: 10px; background: #333; color: white; width: 100%;">
                    END BROADCAST (RESET)
                </button>
            </div>

            <!-- Prayer Feed Block -->
            <div class="admin-panel">
                <span class="gold-text">🕊️ LIVE FEED</span>
                <div class="scroll-area" id="prayer-list" style="max-height: 300px; overflow-y: auto; margin-top: 15px;">
                    <p style="opacity: 0.3; text-align: center; font-size: 0.9rem;">Waiting for mission data...</p>
                </div>
            </div>

            <!-- Lock Control Interface Footer -->
            <div style="text-align: center; margin-top: 30px;">
                <button onclick="location.reload()" style="background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size: 1rem;">Logout &amp; Lock</button>
            </div>
        </div>
    </div>

    <script src="church-logic.js?v=4.0"></script>
</body>
</html>
